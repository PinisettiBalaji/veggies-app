<div class="layout">

    <div class="sidebar">
        <div class="menu-item" [class.active]="selectedCategory === 'all'" (click)="setCategory('all')">
            All
        </div>
        <div class="menu-item" [class.active]="selectedCategory === 'vegetable'" (click)="setCategory('vegetable')">
            Fresh Vegetables
        </div>
        <div class="menu-item" [class.active]="selectedCategory === 'fruit'" (click)="setCategory('fruit')">
            Fresh Fruits
        </div>
        <div class="menu-item" [class.active]="selectedCategory === 'leafy'" (click)="setCategory('leafy')">
            Leafy Vegetables
        </div>
        <div class="menu-item" [class.active]="selectedCategory === 'flower'" (click)="setCategory('flower')">
            Flowers
        </div>
    </div>

    <div class="main">

        <h2>Fresh Vegetables</h2>

        <div class="product-grid">
            <app-product-card *ngFor="let p of filteredProducts" [product]="p">
            </app-product-card>
        </div>

    </div>

</div>
