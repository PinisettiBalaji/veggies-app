<div class="container mt-4">

    <h3>Your Cart</h3>
    <div class="d-flex justify-content-end mb-2">
        <button class="btn btn-outline-danger btn-sm" (click)="clearCart()">
            Clear
        </button>
    </div>

    <div *ngIf="cartService.getCart().length; else empty">

        <div class="card mb-2 p-2" *ngFor="let item of cartService.getCart()">

            <div class="d-flex align-items-center justify-content-between">

                <div>
                    <h6>{{item.name}}</h6>
                    <p>₹{{item.price}} x {{item.qty}}</p>
                </div>

                <div class="d-flex align-items-center gap-2">

                    <button class="btn btn-danger btn-sm" (click)="cartService.removeItem(item)">-</button>

                    <span>{{item.qty}}</span>

                    <button class="btn btn-success btn-sm" (click)="cartService.addToCart(item)">+</button>

                </div>

            </div>

        </div>

        <!-- TOTAL -->
        <h4>Total: ₹{{cartService.getTotal()}}</h4>


        <!-- <button class="btn btn-light" (click)="getCurrentLocation()">
            📍 Use Current Location
        </button> -->
        <!-- ADDRESS -->
        <textarea [(ngModel)]="address" placeholder="Enter full address" class="form-control">
          </textarea>

        <!-- TIMESLOT -->
        <select [(ngModel)]="timeslot" class="form-control">
            <option value="">Select Delivery Slot</option>
            <option>6 AM - 9 AM</option>
            <option>9 AM - 12 PM</option>
            <option>4 PM - 6 PM</option>
            <option>6 PM - 8 PM</option>
        </select>



        <div class="summary">
            <p>Items Total: ₹{{cartService.getTotal()}}</p>
            <p>Delivery Fee: ₹{{deliveryFee}}</p>
            <h4>Total: ₹{{cartService.getTotal() + deliveryFee}}</h4>
        </div>
        <!-- CHECKOUT -->
        <button class="btn btn-success w-100 mt-3" (click)="checkout()">
            Checkout via WhatsApp
        </button>

    </div>

    <ng-template #empty>
        <p>No items in cart</p>
    </ng-template>

</div>
